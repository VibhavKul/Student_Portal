name: Trigger Selenium Tests After Vercel Deploy

# ---------------------------------------------------------------------------
# WHY THIS WORKFLOW EXISTS
# ---------------------------------------------------------------------------
# This app (student-portal) is deployed to Vercel, which auto-redeploys on
# every push to main. The Selenium/Cucumber test suite lives in a SEPARATE
# GitHub repo (VibhavKul/Student_Portal_Automation) and can't see Vercel
# deploys directly. This workflow is the bridge:
#
#   push to main (this repo)
#     -> Vercel starts building/deploying automatically (unrelated to this workflow)
#     -> this workflow polls the Vercel API until that specific commit's
#        deployment reports readyState = READY
#     -> once ready, it fires a `repository_dispatch` event (type:
#        vercel-deployment-succeeded) at Student_Portal_Automation
#     -> that fires its selenium-tests.yml workflow, which runs the suite
#        headless against the now-live production URL
#
# ---------------------------------------------------------------------------
# SECRETS YOU MUST ADD (Settings -> Secrets and variables -> Actions -> New
# repository secret, in THIS repo: VibhavKul/Student_Portal):
# ---------------------------------------------------------------------------
#
# 1) VERCEL_TOKEN
#    What it's for: lets this workflow ask the Vercel API "is the deployment
#    for commit <sha> ready yet?"
#    How to get it: vercel.com -> click your avatar (top right) -> Settings
#    -> Tokens -> Create Token. Give it any name (e.g. "github-actions-poll"),
#    no expiry or a long one, Scope = your personal account (or the team that
#    owns this project). Copy the token immediately (shown once).
#    Add it: Settings -> Secrets and variables -> Actions -> New repository
#    secret -> Name: VERCEL_TOKEN, Value: <paste the token>.
#
# 2) GH_PAT_FOR_DISPATCH
#    What it's for: repository_dispatch requires a token with write access to
#    the TARGET repo (Student_Portal_Automation). The default GITHUB_TOKEN
#    this workflow gets is scoped only to THIS repo, so it can't fire an
#    event on a different repo - you need a personal access token instead.
#    How to get it: github.com -> your avatar -> Settings -> Developer
#    settings -> Personal access tokens -> Fine-grained tokens -> Generate
#    new token. Resource owner: VibhavKul. Repository access: "Only select
#    repositories" -> Student_Portal_Automation. Permissions: Repository
#    permissions -> "Contents": Read and write (repository_dispatch requires
#    this). Generate, then copy the token.
#    Add it: in THIS repo (Student_Portal) -> Settings -> Secrets and
#    variables -> Actions -> New repository secret -> Name:
#    GH_PAT_FOR_DISPATCH, Value: <paste the token>.
#
# Optional: if this Vercel account has more than one project, add a
# VERCEL_PROJECT_ID secret too and pass &projectId=$VERCEL_PROJECT_ID in the
# curl call below, so the commit-SHA lookup can't match a deployment from a
# different project. Not needed for a single-project personal account.
# ---------------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  wait-for-vercel-then-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Poll Vercel until this commit's deployment is READY
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::error::VERCEL_TOKEN secret is not set. See comments at the top of this file." >&2
            exit 1
          fi

          echo "Waiting for Vercel deployment of commit $COMMIT_SHA to become READY..."
          for i in $(seq 1 30); do
            response=$(curl -sS -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?meta-githubCommitSha=$COMMIT_SHA&limit=1")

            ready_state=$(echo "$response" | jq -r '.deployments[0].readyState // empty')
            url=$(echo "$response" | jq -r '.deployments[0].url // empty')

            echo "Attempt $i/30: readyState=${ready_state:-<not found yet>}"

            if [ "$ready_state" = "READY" ]; then
              echo "Deployment is READY at https://$url"
              exit 0
            fi

            if [ "$ready_state" = "ERROR" ] || [ "$ready_state" = "CANCELED" ]; then
              echo "::error::Vercel deployment ended with state $ready_state - not triggering tests." >&2
              exit 1
            fi

            sleep 10
          done

          echo "::error::Timed out waiting for Vercel deployment to become READY." >&2
          exit 1

      - name: Fire repository_dispatch to Student_Portal_Automation
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_FOR_DISPATCH }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::GH_PAT_FOR_DISPATCH secret is not set. See comments at the top of this file." >&2
            exit 1
          fi

          gh api repos/VibhavKul/Student_Portal_Automation/dispatches \
            -f event_type=vercel-deployment-succeeded \
            -f "client_payload[commit_sha]=${{ github.sha }}"

          echo "Dispatched vercel-deployment-succeeded to Student_Portal_Automation."
